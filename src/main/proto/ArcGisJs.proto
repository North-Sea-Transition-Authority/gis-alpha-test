syntax = "proto3";

package arcgisjs;

option java_multiple_files = true;
option java_package = "com.example.grpc";
option java_outer_classname = "ArcGisServiceProto";

service ArcGisService {
  rpc convertGeoJsonLineToEsriJsonLine (GeoJsonRequest) returns (EsriJsonResponse) {};
  rpc buildPolygon (BuildPolygonRequest) returns (EsriJsonResponse) {};
  rpc splitPolygon (SplitPolygonRequest) returns (SplitPolygonResponse) {};
  rpc explodePolygon (ExplodePolygonRequest) returns (ExplodePolygonResponse) {};
  rpc findParentLine (FindParentLineRequest) returns (FindParentLineResponse) {};
  rpc densifyLoxodromePolyline (DensifyLoxodromeLineRequest) returns (DensifyLoxodromeLineResponse) {};
  rpc unionPolygons (UnionPolygonsRequest) returns (UnionPolygonsResponse) {};
  rpc calculatePolygonArea (CalculatePolygonAreaRequest) returns (CalculateAreaResponse) {};
  rpc checkParentContainsChild (CheckParentContainsChildRequest) returns (CheckParentContainsChildResponse) {};
}

message GeoJsonRequest {
  string geoJsonString = 1;
  int32 wkid = 2;
  bool isGeodesic = 3;
}

message EsriJsonResponse {
  string esriJsonString = 1;
}

message BuildPolygonRequest {
  repeated string esriJsonLineStrings = 1;
  int32 srs = 2;
}

message EsriJsonPolygon {
  string esriJsonPolygon = 1;
}

message SplitPolygonRequest {
  EsriJsonPolygon target = 1;
  string esriJsonCutter = 2;
}

message SplitPolygonResponse {
  repeated EsriJsonPolygon polygons = 1;
}

message ExplodePolygonRequest {
  EsriJsonPolygon target = 1;
}

message ExplodePolygonResponse {
  repeated string esriJsonLines = 1;
}

message LineParent {
  int32 id = 1;
  string esriJsonPolyline = 2;
}

message FindParentLineRequest {
  repeated LineParent parents = 1;
  repeated string children = 2;
}

message ReconstructedLine {
  int32 parentId = 1;
  string esriJsonPolyline = 2;
}

message FindParentLineResponse {
  repeated ReconstructedLine lines = 1;
  repeated string orphanedChildrenJson = 2;
}

message DensifyLoxodromeLineRequest {
  string esriJsonPolyline = 1;
}

message DensifyLoxodromeLineResponse {
  string esriJsonPolyline = 1;
}

message UnionPolygonsRequest {
  repeated string esriJsonPolygons = 1;
}

message UnionPolygonsResponse {
  string esriJsonPolygon = 1;
}

message CalculatePolygonAreaRequest {
  string esriJsonPolygon = 1;
}

message CalculateAreaResponse {
  double area = 1;
}

message CheckParentContainsChildRequest {
  string parentPolygon = 1;
  string childPolygon = 2;
}

message CheckParentContainsChildResponse {
  bool isChildContainedByParent = 1;
}