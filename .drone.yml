kind: pipeline
type: docker
name: default

steps:

  - name: fetch-fds-submodule
    image: alpine/git:v2.26.2
    commands:
      - echo "$${BITBUCKET_SSH_KEY}" > bitbucket_ssh_key
      - chmod 600 bitbucket_ssh_key
      - export GIT_SSH_COMMAND="ssh -i bitbucket_ssh_key -F /dev/null  -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no"
      - git submodule update --init --recursive
    environment:
      BITBUCKET_SSH_KEY:
        from_secret: bitbucket_ssh_key

  - name: build-node-backend
    image: node:22.21.1
    commands:
      - cd arcgis-js-sdk
      - npm install
      - npm run copy:core
      - npm run proto-gen
      - cd ..

  - name: build-frontend
    image: node:22.21.1
    commands:
      - npm install
      - npx gulp rollup-babel

  - name: build-java-backend
    image: eclipse-temurin:21-jdk
    privileged: false
    environment:
      TZ: Europe/London
    commands:
      - chmod +x gradlew
      - ./gradlew extractIncludeProto extractProto generateProto
      - ./gradlew bootJar -PbuildType=release

  - name: publish-java-app
    image: plugins/ecr:21
    settings:
      repo: digital/gis-alpha-test
      registry: 847993322739.dkr.ecr.eu-west-2.amazonaws.com
      access_key: AKIA4K4CXHTZ7KAUZJWL
      secret_key:
        from_secret: ecr_secret_key
      config:
        from_secret: docker_config
      region: eu-west-2
      tags:
        - ${DRONE_BRANCH//\//-}-java-app-${DRONE_BUILD_NUMBER}
      dockerfile: ./Dockerfile
    when:
      branch:
        - develop
        - main
      status:
        success

  - name: publish-node-app
    image: plugins/ecr:21
    settings:
      repo: digital/gis-alpha-test
      registry: 847993322739.dkr.ecr.eu-west-2.amazonaws.com
      access_key: AKIA4K4CXHTZ7KAUZJWL
      secret_key:
        from_secret: ecr_secret_key
      config:
        from_secret: docker_config
      region: eu-west-2
      tags:
        - ${DRONE_BRANCH//\//-}-node-app-${DRONE_BUILD_NUMBER}
      dockerfile: ./arcgis-js-sdk/Dockerfile
    when:
      branch:
        - develop
        - main
      status:
        success

trigger:
  event:
    include:
      - push

